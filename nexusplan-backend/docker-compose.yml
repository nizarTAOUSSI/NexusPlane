services:
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexus_network

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - nexus_network

  frontend:
    build:
      context: ../nexusplan-frontend
    networks:
      - nexus_network

  api_gateway:
    build:
      context: ./api_gateway
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - auth_service
      - project_service
      - task_service
      - ai_service
      - realtime_service
      - frontend   
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - nexus_network

  auth_service:
    build:
      context: ./auth_service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./auth_service:/app
    env_file:
      - .env
    environment:
      - SECRET_KEY=${AUTH_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - DEBUG=${DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      - db
    networks:
      - nexus_network

  project_service:
    build:
      context: ./project_service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./project_service:/app
    env_file:
      - .env
    environment:
      - SECRET_KEY=${PROJECT_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - DEBUG=${DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    depends_on:
      - db
    networks:
      - nexus_network

  task_service:
    build:
      context: ./task_service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./task_service:/app
    env_file:
      - .env
    environment:
      - SECRET_KEY=${TASK_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - DEBUG=${DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    depends_on:
      - db
    networks:
      - nexus_network

  ai_service:
    build:
      context: ./ai_service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./ai_service:/app
    env_file:
      - .env
    environment:
      - SECRET_KEY=${AI_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - DEBUG=${DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    depends_on:
      - db
    networks:
      - nexus_network

  realtime_service:
    build:
      context: ./realtime_service
    command: daphne -b 0.0.0.0 -p 8000 realtime_service.asgi:application
    volumes:
      - ./realtime_service:/app
    env_file:
      - .env
    environment:
      - SECRET_KEY=${REALTIME_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_URL=${REDIS_URL}
      - DEBUG=${DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    depends_on:
      - db
      - redis
    networks:
      - nexus_network

volumes:
  postgres_data:

networks:
  nexus_network:
    driver: bridge
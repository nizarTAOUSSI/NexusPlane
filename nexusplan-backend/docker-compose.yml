services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: nexusplan_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexus_network

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - nexus_network

  api_gateway:
    build:
      context: ./api_gateway
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - auth_service
      - project_service
      - task_service
      - ai_service
      - realtime_service
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - nexus_network

  auth_service:
    build:
      context: ./auth_service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./auth_service:/app
    environment:
      - DATABASE_URL=postgres://nexus_user:super_secret_password@db:5432/nexusplan_db
    depends_on:
      - db
    networks:
      - nexus_network

  project_service:
    build:
      context: ./project_service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./project_service:/app
    environment:
      - DATABASE_URL=postgres://nexus_user:super_secret_password@db:5432/nexusplan_db
    depends_on:
      - db
    networks:
      - nexus_network

  task_service:
    build:
      context: ./task_service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./task_service:/app
    environment:
      - DATABASE_URL=postgres://nexus_user:super_secret_password@db:5432/nexusplan_db
    depends_on:
      - db
    networks:
      - nexus_network

  ai_service:
    build:
      context: ./ai_service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./ai_service:/app
    environment:
      - DATABASE_URL=postgres://nexus_user:super_secret_password@db:5432/nexusplan_db
    depends_on:
      - db
    networks:
      - nexus_network

  realtime_service:
    build:
      context: ./realtime_service
    command: daphne -b 0.0.0.0 -p 8000 realtime_service.asgi:application
    volumes:
      - ./realtime_service:/app
    environment:
      - DATABASE_URL=postgres://nexus_user:super_secret_password@db:5432/nexusplan_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - nexus_network

volumes:
  postgres_data:

networks:
  nexus_network:
    driver: bridge
events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # Routage pour le service d'authentification
        location /auth/ {
            proxy_pass http://auth_service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Routage pour le service des projets
        location /projects/ {
            proxy_pass http://project_service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Routage pour le service des tâches
        location /tasks/ {
            proxy_pass http://task_service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Routage pour le service IA (Gemini)
        location /ai/ {
            proxy_pass http://ai_service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Routage pour les WebSockets (Realtime Service via Daphne)
        location /ws/ {
            proxy_pass http://realtime_service:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # --- Swagger UI par service ---
        # Auth Service  →  http://<host>/docs/auth/
        location /docs/auth/ {
            proxy_pass http://auth_service:8000/api/schema/swagger-ui/;
            proxy_set_header Host $host;
        }
        location /docs/auth/schema/ {
            proxy_pass http://auth_service:8000/api/schema/;
            proxy_set_header Host $host;
        }

        # Project Service  →  http://<host>/docs/projects/
        location /docs/projects/ {
            proxy_pass http://project_service:8000/api/schema/swagger-ui/;
            proxy_set_header Host $host;
        }
        location /docs/projects/schema/ {
            proxy_pass http://project_service:8000/api/schema/;
            proxy_set_header Host $host;
        }

        # Task Service  →  http://<host>/docs/tasks/
        location /docs/tasks/ {
            proxy_pass http://task_service:8000/api/schema/swagger-ui/;
            proxy_set_header Host $host;
        }
        location /docs/tasks/schema/ {
            proxy_pass http://task_service:8000/api/schema/;
            proxy_set_header Host $host;
        }

        # AI Service  →  http://<host>/docs/ai/
        location /docs/ai/ {
            proxy_pass http://ai_service:8000/api/schema/swagger-ui/;
            proxy_set_header Host $host;
        }
        location /docs/ai/schema/ {
            proxy_pass http://ai_service:8000/api/schema/;
            proxy_set_header Host $host;
        }

        # Realtime Service  →  http://<host>/docs/realtime/
        location /docs/realtime/ {
            proxy_pass http://realtime_service:8000/api/schema/swagger-ui/;
            proxy_set_header Host $host;
        }
        location /docs/realtime/schema/ {
            proxy_pass http://realtime_service:8000/api/schema/;
            proxy_set_header Host $host;
        }
    }
}
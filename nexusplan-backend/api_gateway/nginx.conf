events {
    worker_connections 1024;
}

http {
    # 1. Redirige tout le trafic HTTP vers HTTPS
    server {
        listen 80;
        server_name nexusplane.duckdns.org;
        return 301 https://$host$request_uri;
    }

    # 2. Serveur HTTPS sécurisé
    server {
        listen 443 ssl;
        server_name nexusplane.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/nexusplane.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nexusplane.duckdns.org/privkey.pem;

        # Microservices
        location /auth/ {
            proxy_pass http://auth_service:8000/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /projects/ {
            proxy_pass http://project_service:8000/api/projects/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /memberships/ {
            proxy_pass http://project_service:8000/api/memberships/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /tasks/ {
            proxy_pass http://task_service:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /ai/ {
            proxy_pass http://ai_service:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSockets
        location /ws/ {
            proxy_pass http://realtime_service:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Swagger UI unifié
        location = /docs/ {
            root /usr/share/nginx/html;
            try_files /swagger.html =404;
        }

        # Schémas OpenAPI par service
        location /docs/schema/auth/ {
            proxy_pass http://auth_service:8000/api/schema/;
            proxy_set_header Host $host;
        }
        location /docs/schema/projects/ {
            proxy_pass http://project_service:8000/api/schema/;
            proxy_set_header Host $host;
        }
        location /docs/schema/tasks/ {
            proxy_pass http://task_service:8000/api/schema/;
            proxy_set_header Host $host;
        }
        location /docs/schema/ai/ {
            proxy_pass http://ai_service:8000/api/schema/;
            proxy_set_header Host $host;
        }
        location /docs/schema/realtime/ {
            proxy_pass http://realtime_service:8000/api/schema/;
            proxy_set_header Host $host;
        }


   location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

    }
}